name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-cov 2>/dev/null || true

      - name: Run tests
        run: |
          if [ -f requirements.txt ]; then
            pytest --tb=short || echo "No tests or tests failed"
          else
            echo "No requirements.txt found — skipping test step"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Deployment triggered! 🎉"
          echo "Repo: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          # 在这里添加你的部署命令
          # 例如：scp, rsync, docker push, Vercel, Netlify 等
